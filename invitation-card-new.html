<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prisha's 1st Birthday | Premium Invitation</title>
  <style>
    :root {
      --gold: #d4af37;
      --rose-gold: #b76e79;
      --cream: #fff8f1;
      --soft-pink: #ffe4e1;
      --deep-rose: #d91f4f;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background-color: var(--cream);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .card-wrapper {
      width: 100%;
      max-width: 500px;
      padding: 20px;
      perspective: 1000px;
    }

    .card {
      background: var(--white);
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 6;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 30px 60px rgba(183, 110, 121, 0.25);
      border: 8px solid var(--white);
      outline: 1px solid var(--gold);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      text-align: center;
      animation: entryScale 1s cubic-bezier(0.17, 0.67, 0.83, 0.67);
    }

    @keyframes entryScale {
      from { transform: scale(0.9) translateY(20px); opacity: 0; }
      to { transform: scale(1) translateY(0); opacity: 1; }
    }

    /* Decorative Corners */
    .card::before, .card::after {
      content: "🌸";
      position: absolute;
      font-size: 2rem;
      opacity: 0.6;
    }

    .card::before { top: 10px; left: 10px; }
    .card::after { bottom: 10px; right: 10px; }

    .sparkles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image: radial-gradient(circle, var(--gold) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: twinkle 5s infinite alternate;
      opacity: 0.1;
    }

    @keyframes twinkle {
      from { opacity: 0.1; transform: scale(1); }
      to { opacity: 0.3; transform: scale(1.1); }
    }

    .photo-frame {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 5px solid var(--white);
      box-shadow: 0 0 0 4px var(--gold), 0 15px 30px rgba(0,0,0,0.1);
      overflow: hidden;
      margin-bottom: 25px;
      position: relative;
      z-index: 2;
    }

    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .badge-one {
      position: absolute;
      top: 150px;
      right: 30%;
      width: 60px;
      height: 60px;
      background: var(--gold);
      color: var(--white);
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-family: Georgia, serif;
      font-size: 2rem;
      font-weight: bold;
      box-shadow: 0 8px 15px rgba(212, 175, 55, 0.4);
      z-index: 3;
      border: 2px solid var(--white);
    }

    .eyebrow {
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 3px;
      font-size: 0.85rem;
      font-weight: 800;
      margin-bottom: 10px;
    }

    h1 {
      font-family: "Playfair Display", Georgia, serif;
      font-size: 3.5rem;
      color: var(--deep-rose);
      margin: 0;
      line-height: 1;
      text-shadow: 2px 2px 0 var(--soft-pink);
    }

    .sub-title {
      font-size: 1.1rem;
      color: var(--rose-gold);
      font-weight: 600;
      margin-top: 5px;
    }

    .details-box {
      margin-top: 30px;
      width: 100%;
      display: grid;
      gap: 15px;
    }

    .detail-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .detail-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      color: var(--gold);
      letter-spacing: 1px;
      font-weight: 900;
      margin-bottom: 2px;
    }

    .detail-value {
      font-size: 1.1rem;
      color: var(--ink);
      font-weight: 700;
      line-height: 1.3;
    }

    .footer-note {
      margin-top: auto;
      font-size: 0.9rem;
      color: var(--rose-gold);
      font-style: italic;
      padding-top: 20px;
    }

    .btn-rsvp {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 30px;
      background: linear-gradient(135deg, var(--deep-rose), var(--rose-gold));
      color: white;
      text-decoration: none;
      border-radius: 999px;
      font-weight: 800;
      box-shadow: 0 10px 20px rgba(217, 31, 79, 0.3);
      transition: transform 0.2s;
    }

    .btn-rsvp:hover {
      transform: translateY(-3px);
    }

    @media (max-width: 400px) {
      h1 { font-size: 2.8rem; }
      .photo-frame { width: 150px; height: 150px; }
      .badge-one { top: 120px; width: 50px; height: 50px; font-size: 1.5rem; }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="card-wrapper">
    <div class="card">
      <div class="sparkles"></div>
      
      <div class="photo-frame">
        <img src="ChatGPT Image Jun 1, 2026, 08_21_38 AM.png" alt="Prisha">
      </div>
      <div class="badge-one">1</div>

      <div class="eyebrow">You are invited to</div>
      <h1>Prisha's</h1>
      <div class="sub-title">First Birthday Celebration</div>

      <div class="details-box">
        <div class="detail-item">
          <span class="detail-label">Date & Time</span>
          <span class="detail-value">Sunday, 14 June 2026<br>12:30 PM Onwards</span>
        </div>

        <div class="detail-item">
          <span class="detail-label">The Venue</span>
          <span class="detail-value">Peerless Hotel Hyderabad<br>Ground floor</span>
        </div>
      </div>

      <p class="footer-note">Your blessings are the greatest gift...</p>
      
      <div style="display: flex; gap: 10px; margin-top: 20px;">
        <a href="index.html#rsvp" class="btn-rsvp">Send RSVP</a>
        <button id="downloadBtn" class="btn-rsvp" style="background: var(--gold); cursor: pointer; border: none;">Save as Image</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    document.getElementById('downloadBtn').addEventListener('click', function() {
      const card = document.querySelector('.card');
      const btnGroup = this.parentElement;
      const statusBtn = this;
      const originalText = statusBtn.innerText;
      
      statusBtn.innerText = 'Generating...';
      statusBtn.disabled = true;
      
      // Hide buttons temporarily for the screenshot
      btnGroup.style.opacity = '0';
      
      // Ensure all images are loaded before capturing
      const images = card.querySelectorAll('img');
      const promises = Array.from(images).map(img => {
        if (img.complete) return Promise.resolve();
        return new Promise(resolve => { img.onload = resolve; img.onerror = resolve; });
      });

      Promise.all(promises).then(() => {
        // Add a small delay for any CSS animations to settle
        setTimeout(() => {
          html2canvas(card, {
            scale: 3, // Even higher quality for sharing
            useCORS: true,
            allowTaint: true,
            logging: false,
            backgroundColor: '#fff8f1',
            width: card.offsetWidth,
            height: card.offsetHeight
          }).then(canvas => {
            try {
              const imageData = canvas.toDataURL('image/jpeg', 0.95);
              const link = document.createElement('a');
              link.download = 'Prisha-1st-Birthday-Invitation.jpg';
              link.href = imageData;
              document.body.appendChild(link);
              link.click();
              document.body.removeChild(link);
            } catch (err) {
              console.error('Download failed', err);
              alert('Sorry, the automatic download failed. Please try taking a screenshot of the card instead!');
            }
            
            // Restore UI
            btnGroup.style.opacity = '1';
            statusBtn.innerText = originalText;
            statusBtn.disabled = false;
          }).catch(err => {
            console.error('Canvas generation failed', err);
            btnGroup.style.opacity = '1';
            statusBtn.innerText = originalText;
            statusBtn.disabled = false;
            alert('Could not generate image. A quick screenshot might be best!');
          });
        }, 500);
      });
    });
  </script>
</body>
</html>
